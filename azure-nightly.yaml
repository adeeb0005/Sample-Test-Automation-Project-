trigger:
  branches:
    include:
      - azure_nightly  # You can specify your desired branch here

schedules:
  - cron: "0 0 * * *"  # Triggers the pipeline daily at 12:00 AM UTC (6 AM BST)
    displayName: "Nightly Test"
    branches:
      include:
        - azure_nightly  # Specify the branch to trigger the pipeline on
    always: true  # Ensures the pipeline always runs at the scheduled time

pool:
  vmImage: 'ubuntu-latest'  # Use the latest Ubuntu image

variables:
  mavenVersion: '3.9.9'
  TESTNG_XML: $(suite_path)
  REPORTS_DIR: 'target/surefire-reports'

  report_environment: $(environment)
  report_documentTitle: "Test Report"
  report_reportName: "Nightly Test Report"
  report_suiteName: $(suite_name)
  report_sprintName: $(sprint)
  report_timezone: "UTC+6"
  report_sendReportToTeams: "Yes"
  report_teamsWebhookUrl: $(teams_url)

  user_tester: $(tester)
  user_email: $(sv_email)
  user_password: $(sv_password)

  ui_browser: $(browser)
  ui_headless: true
  ui_windowSize: "1920x1080"
  ui_implicitWait: 10
  ui_explicitWait: 20
  ui_chromeDriverPath: "drivers/chromedriver.exe"
  ui_firefoxDriverPath: "drivers/geckodriver.exe"
  ui_url: $(sv_url)

  api_baseUrl: $(api_base_url)
  api_accessToken: $(api_access_token)
  api_tokenUrl: $(token_url)
  api_clientId: $(api_client_id)
  api_clientSecret: $(api_client_secret)
  api_orgId: $(api_org_id)

  db_host: $(host)
  db_port: $(port)
  db_database: $(database)
  db_url: $(DBUrl)
  db_user: $(DBUser)
  db_password: $(DBPassword)

  friga_frigaUrl: $(friga_url)
  friga_frigaPushLocationDataUrl: $(friga_push_location_data_url)
  friga_frigaPushLocationDataEndpoint: $(friga_push_location_data_endpoint)
  # TESTNG_XML: 'src/test/resources/testng_suites/testng_regression.xml'
  # - group: TEST-test-automation-vars

jobs:
  - job: TestJob
    timeoutInMinutes: 180
    displayName: Run Selenium Tests
    continueOnError: true

    steps:
      - script: |
          echo mavenVersion=$(mavenVersion)
          export TESTNG_XML=$(TESTNG_XML)
          echo "TESTNG_XML=$TESTNG_XML"
          export REPORTS_DIR=$(REPORTS_DIR)
          echo "REPORTS_DIR=$REPORTS_DIR"
          
          export report_environment=$(report_environment)
          echo "report_environment=$report_environment"
          export report_documentTitle=$(report_documentTitle)
          echo "report_documentTitle=$report_documentTitle"
          export report_reportName=$(report_reportName)
          echo "report_reportName=$report_reportName"
          export report_suiteName=$(report_suiteName)
          echo "report_suiteName=$report_suiteName"
          export report_sprintName=$(report_sprintName)
          echo "report_sprintName=$report_sprintName"
          export report_timezone=$(report_timezone)
          echo "report_timezone=$report_timezone"
          export report_sendReportToTeams=$(report_sendReportToTeams)
          echo "report_sendReportToTeams=$report_sendReportToTeams"
          export report_teamsWebhookUrl=$(report_teamsWebhookUrl)
          echo "report_teamsWebhookUrl=$report_teamsWebhookUrl"
    
          export user_tester=$(user_tester)
          echo "user_tester=$user_tester"
          export user_email=$(user_email)
          echo "user_email=$user_email"
          export user_password=$(user_password)
          echo "user_password=$user_password"
    
          export ui_browser=$(ui_browser)
          echo "ui_browser=$ui_browser"
