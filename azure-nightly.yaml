        displayName: Debug variables
        
      # Step 1: Checkout the code
      - checkout: self

      # Step 2: Install Google Chrome and ChromeDriver
      - script: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          sudo apt-get install -y chromium-chromedriver
          which chromedriver
        displayName: Install Chrome and ChromeDriver

      # Step 3: Install Java 11
      - script: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk
          which java
          readlink -f $(which java)
          echo $JAVA_HOME
          java -version
        displayName: "Install Java 11"

      # Step 4: Install Maven 3.9.9
      - script: |
          wget https://downloads.apache.org/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz
          sudo tar -xvzf apache-maven-3.9.9-bin.tar.gz -C /opt
          sudo rm -f /usr/bin/mvn
          sudo ln -s /opt/apache-maven-3.9.9/bin/mvn /usr/bin/mvn
          mvn -v  # Verify Maven installation
        displayName: Install Maven 3.9.9

      # Step 5: Run Selenium Tests using Maven and TestNG
      - script: |
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          echo "Using Java Home: $JAVA_HOME"
          java -version

          # Create the output directories if they don't exist
          mkdir -p $(Build.SourcesDirectory)/target/testng-reports
          mkdir -p $(Build.SourcesDirectory)/target/surefire-reports

          # Debug TestNG XML file path
          echo "TestNG XML file path: $(suite_path)"
          
          # Directly specify a default TestNG XML file if the variable is not available
          if [ -z "$(suite_path)" ]; then
            echo "suite_path variable is empty, using default TestNG XML"
            TESTNG_FILE="src/test/resources/testng_suites/testng_regression.xml"
          else
            TESTNG_FILE="$(suite_path)"
          fi
          
          echo "Using TestNG file: $TESTNG_FILE"
          
          export MAVEN_OPTS="-Dmaven.test.failure.ignore=true"
          echo "Running Tests with Maven and TestNG..."
          
          mvn clean test \
            -DsuiteXmlFile="$TESTNG_FILE" \
            -Dsurefire.useFile=false \
            -DoutputDirectory=target/testng-reports \
            -fae | tee test_execution.log
        displayName: Run Selenium Regression Tests
        continueOnError: true

      # Step 6: Publish the test results
      - task: PublishTestResults@2
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: |
            **/target/surefire-reports/TEST-*.xml
            **/target/surefire-reports/junitreports/TEST-*.xml
            **/target/testng-reports/TEST-*.xml
          searchFolder: '$(Build.SourcesDirectory)'
          mergeTestResults: true
          testRunTitle: 'TestNG Test Results'
          failTaskOnFailedTests: false  # Don't fail the task on test failures
          publishRunAttachments: true
        displayName: 'Publish Test Results'
        condition: succeededOrFailed()

      # Step 7: Publish Surefire Reports
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: '$(Build.SourcesDirectory)/target/surefire-reports'
          artifact: 'TestReports-Surefire'
          publishLocation: 'pipeline'
        displayName: 'Publish Surefire Test Reports'
        condition: succeededOrFailed()

      # Step 8: Publish TestNG Reports with directory existence check
      - task: Bash@3
        inputs:
          targetType: 'inline'
          script: |
            if [ -d "$(Build.SourcesDirectory)/target/testng-reports" ]; then
              echo "##vso[task.setvariable variable=testngReportsExist]true"
            else
              echo "##vso[task.setvariable variable=testngReportsExist]false"
              echo "TestNG reports directory does not exist. Skipping publish step."
            fi
        displayName: 'Check if TestNG reports exist'
        continueOnError: true

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: '$(Build.SourcesDirectory)/target/testng-reports'
          artifact: 'TestReports-TestNG'
          publishLocation: 'pipeline'
        displayName: 'Publish TestNG Test Reports'
        condition: and(succeededOrFailed(), eq(variables['testngReportsExist'], 'true'))
        continueOnError: true