          echo "ui_chromeDriverPath=$ui_chromeDriverPath"
          export ui_firefoxDriverPath=$(ui_firefoxDriverPath)
          echo "ui_firefoxDriverPath=$ui_firefoxDriverPath"
          export ui_url=$(ui_url)
          echo "ui_url=$ui_url"
    
          export api_baseUrl=$(api_baseUrl)
          echo "api_baseUrl=$api_baseUrl"
          export api_accessToken=$(api_accessToken)
          echo "api_accessToken=$api_accessToken"
          export api_tokenUrl=$(api_tokenUrl)
          echo "api_tokenUrl=$api_tokenUrl"
          export api_clientId=$(api_clientId)
          echo "api_clientId=$api_clientId"
          export api_clientSecret=$(api_clientSecret)
          echo "api_clientSecret=$api_clientSecret"
          export api_orgId=$(api_orgId)
          echo "api_orgId=$api_orgId"
    
          export db_host=$(db_host)
          echo "db_host=$db_host"
          export db_port=$(db_port)
          echo "db_port=$db_port"
          export db_database=$(db_database)
          echo "db_database=$db_database"
          export db_url=$(db_url)
          echo "db_url=$db_url"
          export db_user=$(db_user)
          echo "db_user=$db_user"
          export db_password=$(db_password)
          echo "db_password=$db_password"
    
          export friga_frigaUrl=$(friga_frigaUrl)
          echo "friga_frigaUrl=$friga_frigaUrl"
          export friga_frigaPushLocationDataUrl=$(friga_frigaPushLocationDataUrl)
          echo "friga_frigaPushLocationDataUrl=$friga_frigaPushLocationDataUrl"
          export friga_frigaPushLocationDataEndpoint=$(friga_frigaPushLocationDataEndpoint)
          echo "friga_frigaPushLocationDataEndpoint=$friga_frigaPushLocationDataEndpoint"
